<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mortgage Calculator | MoveEase SG</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="mortgage">
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="container header-bar">
        <a class="brand" href="index.html">MoveEase SG</a>
        <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="site-nav">
          <span class="menu-toggle__label">Menu</span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation"></nav>
      </div>
    </header>

    <main id="main-content" class="page-shell">
      <div class="container mortgage-layout">
        <section class="card mortgage-card">
          <p class="eyebrow">Mortgage planning</p>
          <h1>Estimate your monthly repayment</h1>
          <p>Use a standard amortisation formula to see how your loan outlook changes.</p>

          <form id="mortgage-form" class="mortgage-form" novalidate>
            <label class="field-group">
              <span class="field-group__label">Loan amount (SGD)</span>
              <input type="number" name="loanAmount" min="100000" step="10000" placeholder="800000" required />
            </label>

            <label class="field-group">
              <span class="field-group__label">Interest rate (%)</span>
              <input type="number" name="interestRate" min="0" step="0.1" placeholder="3.5" required />
            </label>

            <label class="field-group">
              <span class="field-group__label">Loan tenure (years)</span>
              <input type="number" name="tenure" min="1" step="1" placeholder="25" required />
            </label>

            <div class="form-actions">
              <button class="button button--primary" type="submit">Calculate</button>
              <button class="button button--secondary" type="reset">Reset</button>
            </div>
          </form>
          <div id="mortgage-error" class="status-message" hidden></div>
        </section>

        <section class="card summary-card" aria-labelledby="summary-title">
          <h2 id="summary-title">Repayment summary</h2>
          <div class="summary-grid">
            <div class="summary-item">
              <span class="summary-item__label">Principal</span>
              <strong id="summary-principal">-</strong>
            </div>
            <div class="summary-item">
              <span class="summary-item__label">Monthly repayment</span>
              <strong id="summary-monthly">-</strong>
            </div>
            <div class="summary-item">
              <span class="summary-item__label">Total repayment</span>
              <strong id="summary-total">-</strong>
            </div>
            <div class="summary-item">
              <span class="summary-item__label">Total interest</span>
              <strong id="summary-interest">-</strong>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer id="site-footer" class="site-footer"></footer>

    <script src="app.js" defer></script>
  </body>
</html>
