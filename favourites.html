<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favourites | MoveEase SG</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="favourites">
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="container header-bar">
        <a class="brand" href="index.html">MoveEase SG</a>
        <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="site-nav">
          <span class="menu-toggle__label">Menu</span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation"></nav>
      </div>
    </header>

    <main id="main-content" class="page-shell">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Saved homes</p>
            <h1>Your favourites</h1>
          </div>
          <button class="button button--secondary" id="clear-favourites" type="button">Clear all</button>
        </div>

        <div id="loading-state" class="loading-state" aria-live="polite" hidden></div>
        <div id="error-state" class="status-message" data-error hidden></div>
        <div id="favourites-results" class="property-grid" data-results></div>
      </div>
    </main>

    <footer id="site-footer" class="site-footer"></footer>

    <script src="app.js" defer></script>
  </body>
</html>
